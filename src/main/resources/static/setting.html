<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>帳號設定 - GoodDeal</title>
<link rel="stylesheet" href="css/style.css" />
<style>
/* 頁面專屬佈局 */
.container {
	padding: 80px 16px 100px; /* 頂部預留給固定 nav */
	max-width: 500px;
	margin: 0 auto;
}

/* 卡片設計 */
.card {
	background: #fff;
	padding: 24px;
	margin-bottom: 20px;
	border-radius: 16px;
	box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
	border: 1px solid #f1f5f9;
}

.card h2 {
	margin: 0 0 20px 0;
	font-size: 18px;
	display: flex;
	align-items: center;
	gap: 8px;
	font-weight: 700;
}

/* 表單元素 */
.form-group {
	margin-bottom: 16px;
}

label {
	display: block;
	font-size: 14px;
	color: #64748b;
	margin-bottom: 6px;
	font-weight: 500;
}

input {
	width: 100%;
	padding: 12px;
	border: 1px solid #e2e8f0;
	border-radius: 10px;
	box-sizing: border-box;
	font-size: 16px;
	transition: all 0.2s;
}

input:focus {
	outline: none;
	border-color: var(--primary-color, #000);
	background: #f8fafc;
}

/* 按鈕樣式 */
button {
	width: 100%;
	padding: 14px;
	border-radius: 12px;
	border: none;
	font-size: 16px;
	font-weight: 600;
	cursor: pointer;
	transition: 0.2s;
}

.btn-save {
	background: var(--primary-color, #000);
	color: #fff;
	margin-top: 10px;
}

.btn-danger {
	background: #fee2e2;
	color: #dc2626;
	margin-top: 10px;
}

.btn-logout {
	background: transparent;
	color: #64748b;
	border: 1px solid #e2e8f0;
	padding: 12px;
	font-size: 15px;
}

button:active {
	opacity: 0.7;
	transform: scale(0.98);
}

/* 導覽列優化：改為關閉圖示 */
.nav-close {
	width: 40px;
	height: 40px;
	display: flex;
	align-items: center;
	justify-content: center;
	cursor: pointer;
	border-radius: 50%;
	transition: background 0.2s;
}

.nav-close:hover {
	background: #f1f5f9;
}

.nav-title {
	font-size: 18px;
	font-weight: 700;
}
</style>
</head>
<body>

<nav>
	<div class="nav-container">
		<span class="nav-title">設定</span>
		<div style="margin-left: auto;">
			<div class="nav-close" onclick="location.href='profile.html'">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
						stroke-linejoin="round">
					<line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
			</div>
		</div>
	</div>
</nav>

<div class="container">
	<div class="card">
		<h2>👤 基本資料</h2>
		<div class="form-group">
			<label>使用者名稱</label> <input type="text" id="username"
					placeholder="請輸入姓名">
		</div>
		<div class="form-group">
			<label>Email 地址</label> <input type="email" id="email"
					placeholder="example@mail.com">
		</div>
		<button class="btn-save" onclick="updateProfile()">💾 儲存修改</button>
	</div>

	<div class="card">
		<h2>🔐 安全設定</h2>
		<div class="form-group">
			<label>舊密碼</label> <input type="password" id="oldPassword"
					placeholder="••••••••">
		</div>
		<div class="form-group">
			<label>新密碼</label> <input type="password" id="newPassword"
					placeholder="••••••••">
		</div>
		<div class="form-group">
			<label>確認新密碼</label> <input type="password" id="confirmPassword"
					placeholder="••••••••">
		</div>
		<button class="btn-danger" onclick="changePassword()">修改密碼</button>
	</div>

	<div style="margin-top: 30px;">
		<button class="btn-logout" onclick="handleLogout()">🚪 登出帳號</button>
	</div>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>

<script>
// 1. 載入資料
async function loadSetting() {
    try {
        const user = await apiGet("/users/profile");
        if (user) {
            document.getElementById("username").value = user.username || "";
            document.getElementById("email").value = user.email || "";
        }
    } catch (err) {
        console.warn("API 載入失敗或未登入");
    }
}

// 2. 更新個人資料
async function updateProfile() {
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    if (!username || !email) { alert("資料不可空白"); return; }

    try {
        await apiPut("/users/profile", { username, email });
        alert("會員資料已更新");
    } catch (err) {
        alert("更新失敗：" + (err.message || "請稍後再試"));
    }
}

// 3. 修改密碼
async function changePassword() {
    const oldPwd = document.getElementById("oldPassword").value;
    const newPwd = document.getElementById("newPassword").value;
    const confirmPwd = document.getElementById("confirmPassword").value;

    if (!oldPwd || !newPwd) { alert("請填寫完整"); return; }
    if (newPwd !== confirmPwd) { alert("新密碼不一致"); return; }

    try {
        await apiPut("/users/password", { oldPassword: oldPwd, newPassword: newPwd });
        alert("密碼修改成功，請重新登入");
        handleLogout(false); // 靜默登出
    } catch (err) {
        alert("修改失敗：" + err.message);
    }
}

// 4. 登出處理
function handleLogout(showConfirm = true) {
    const performLogout = () => {
        if (typeof logout === 'function') {
            logout();
        } else {
            localStorage.clear();
            window.location.href = "index.html";
        }
    };

    if (showConfirm) {
        if (confirm("確定要登出 GoodDeal 嗎？")) performLogout();
    } else {
        performLogout();
    }
}

// 初始化
loadSetting();
</script>
</body>
</html>
