<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin｜商品價格管理</title>

<style>
:root {
	--primary: #2563eb;
	--danger: #ef4444;
	--bg: #f8fafc;
	--sidebar-bg: #0f172a;
}

body {
	margin: 0;
	font-family: system-ui, -apple-system, sans-serif;
	background: var(--bg);
	color: #1e293b;
}

.admin-layout {
	display: flex;
	min-height: 100vh;
}

.sidebar {
	width: 240px;
	background: var(--sidebar-bg);
	color: #e5e7eb;
	padding: 20px 0;
	flex-shrink: 0;
	transition: transform 0.3s ease;
}

.sidebar h2 {
	text-align: center;
	font-size: 18px;
	margin-bottom: 24px;
	color: #fff;
}

.sidebar a {
	display: block;
	padding: 12px 24px;
	color: #cbd5e1;
	text-decoration: none;
	font-size: 15px;
}

.sidebar a:hover {
	background: #1e293b;
	color: #fff;
}

.sidebar a.active {
	background: var(--primary);
	color: #fff;
	font-weight: 600;
}

.admin-content {
	flex: 1;
	padding: 40px;
}

.mobile-header {
	display: none;
	background: var(--sidebar-bg);
	color: white;
	padding: 15px 20px;
	position: sticky;
	top: 0;
	z-index: 1000;
	align-items: center;
}

.menu-toggle {
	background: none;
	border: none;
	color: white;
	font-size: 24px;
	cursor: pointer;
	margin-right: 15px;
}

.price-up {
	color: #dc2626;
	font-weight: bold;
} /* 漲價紅色 */
.price-down {
	color: #16a34a;
	font-weight: bold;
} /* 降價綠色 */
.modal {
	display: none;
	position: fixed;
	inset: 0;
	background: rgba(0, 0, 0, 0.5);
	align-items: center;
	justify-content: center;
	z-index: 1000;
}

.modal-content {
	background: white;
	padding: 24px;
	border-radius: 12px;
	width: 100%;
	max-width: 450px;
}

.form-group {
	margin-bottom: 15px;
}

.form-group label {
	display: block;
	margin-bottom: 5px;
	font-weight: 600;
}

.form-group select, .form-group input {
	width: 100%;
	padding: 8px;
	border: 1px solid #ddd;
	border-radius: 6px;
}

@media ( max-width : 768px) {
	.mobile-header {
		display: flex;
	}
	.sidebar {
		position: fixed;
		left: 0;
		top: 0;
		bottom: 0;
		z-index: 3000;
		transform: translateX(-100%);
	}
	.sidebar.active {
		transform: translateX(0);
	}
	.sidebar-overlay {
		display: none;
		position: fixed;
		inset: 0;
		background: rgba(0, 0, 0, 0.5);
		z-index: 2500;
	}
	.sidebar-overlay.active {
		display: block;
	}
	.admin-content {
		padding: 15px;
	}
}

@media ( min-width : 768px) {
	.mobile-header {
		display: none;
	}
}
</style>
</head>
<body>
<div class="admin-layout">
	<main class="admin-content">
		<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
			<h2>🏷️ 商品價格維護</h2>
			<button class="btn-primary" onclick="openEditModal()" style="background: #f59e0b;">✏️ 查找與編輯單筆價格</button>
		</div>

		<div class="card" style="margin-bottom: 30px; border: 2px solid var(--primary);">
			<div style="padding: 15px; background: #eff6ff; display: flex; justify-content: space-between; align-items: center;">
				<div style="display: flex; gap: 15px; align-items: center;">
					<h3 style="margin: 0;">✨ 批次快速新增</h3>
					<select id="batchStoreId" onchange="loadMissingProducts(this.value)" style="padding: 8px; border-radius: 6px;">
						<option value="">--- 請選擇通路開始新增 ---</option>
					</select>
				</div>
				<button id="batchSaveBtn" class="btn-save" onclick="saveBatchNewPrices()" style="background: #2563eb; color: white; display: none;">
					💾 儲存所有新價格
				</button>
			</div>
			<table>
				<thead>
					<tr>
						<th>待定價商品</th>
						<th width="200">輸入價格 ($)</th>
					</tr>
				</thead>
				<tbody id="missingProductsBody">
					<tr>
						<td colspan="2" style="text-align: center; color: #94a3b8;">請先選擇通路</td>
					</tr>
				</tbody>
			</table>
		</div>

		<div class="card">
			<div style="padding: 15px;">
				<h3>📋 現有價格清單</h3>
			</div>
			<table>
				<thead>
					<tr>
						<th>商品名稱</th>
						<th>通路</th>
						<th>當前價格</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody id="priceTableBody"></tbody>
			</table>
		</div>
	</main>

	<div id="editPriceModal" class="modal">
		<div class="modal-content">
			<h3 id="modalTitle">✏️ 編輯價格</h3>
			<form id="editPriceForm">
				<input type="hidden" id="editRecordId">
				<div class="form-group">
					<label>通路</label> 
					<select id="editStoreId" onchange="loadProductsForStore(this.value)" required></select>
				</div>
				<div class="form-group">
					<label>商品</label> 
					<select id="editProductId" onchange="fetchCurrentPrice()" required disabled>
						<option value="">請先選擇通路</option>
					</select>
				</div>
				<div class="form-group" id="currentPriceInfo" style="display: none; padding: 10px; background: #fef3c7; border-radius: 8px; margin-bottom: 15px;">
					<span style="font-size: 13px; color: #92400e;">目前的價格為：</span> 
					<strong id="oldPriceValue" style="font-size: 18px; color: #d97706;">$0</strong>
				</div>
				<div class="form-group">
					<label>設定新價格 ($)</label> <input type="number" id="newPriceInput" required min="0">
				</div>
				<div style="display: flex; gap: 10px; margin-top: 20px;">
					<button type="submit" class="btn-save" style="flex: 1; background: var(--primary); color: white;">確認修改</button>
					<button type="button" onclick="closeEditModal()" style="flex: 1;">取消</button>
				</div>
			</form>
		</div>
	</div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin-common.js"></script>
<script src="../js/admin-prices.js"></script>
</body>
</html>
