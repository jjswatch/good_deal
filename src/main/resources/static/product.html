<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>商品簡介｜CoSave　一塊省</title>
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
	--primary-red: #FF4500;
	--secondary-red: #ef4444;
	--text-dark: #1e293b;
	--text-gray: #64748b;
	--bg-light: #f8fafc;
	--border-color: #e2e8f0;
}

.container {
	max-width: 1100px;
	margin: 0 auto;
	padding: 0 20px;
}

/* 商品卡片 */
#productInfo {
	background: white;
	border-radius: 16px;
	padding: 24px;
	margin: 20px auto;
	box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
	display: flex;
	gap: 30px;
	text-align: left;
	align-items: flex-start;
}

#productInfo img {
	width: 220px;
	height: 220px;
	object-fit: contain;
	border-radius: 12px;
	background: #f8fafc;
	flex-shrink: 0;
}

.product-detail-content {
	flex-grow: 1;
	display: flex;
	flex-direction: column;
}

.product-name {
	font-size: 1.6rem;
	font-weight: 800;
	margin: 0 0 12px 0;
	color: var(--text-dark);
	line-height: 1.3;
}

.product-desc {
	font-size: 0.95rem;
	color: var(--text-gray);
	line-height: 1.6;
	margin-bottom: 15px;
	/* 限制描述為 3 行，超過顯示省略號 */
	display: -webkit-box;
	-webkit-line-clamp: 3;
	line-clamp: 3;
	-webkit-box-orient: vertical;
	overflow: hidden;
}

.product-meta {
	font-size: 0.85rem;
	color: var(--text-gray);
}

.product-meta-tags {
	display: flex;
	flex-wrap: wrap;
	gap: 8px;
	margin-top: 10px;
}

.product-header {
    display: block; /* 回歸區塊佈局 */
}

.product-image-wrapper {
    position: relative;
    flex-shrink: 0; /* 確保圖片不被壓縮 */
}

.meta-tag {
	font-size: 0.75rem;
	padding: 4px 10px;
	background: #f1f5f9;
	color: #475569;
	border-radius: 6px;
	border: 1px solid #e2e8f0;
}

/* 價格摘要卡片 */
.best-price-card {
	display: inline-flex;
	flex-direction: column;
	align-items: center;
	background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
	border: 2px solid var(--border-color);
	border-radius: 20px;
	padding: 20px 40px;
	margin: 20px 0;
	box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
	width: 100%;
	max-width: 450px;
	box-sizing: border-box;
}

.best-price-label {
	font-size: 12px;
	font-weight: 700;
	padding: 4px 12px;
	border-radius: 50px;
	margin-bottom: 12px;
}

.label-history {
	background: #fee2e2;
	color: var(--secondary-red);
	border: 1px solid #fecaca;
}

.label-recent {
	background: #dbeafe;
	color: #2563eb;
	border: 1px solid #bfdbfe;
}

.best-price-value {
	font-size: 36px;
	font-weight: 900;
	color: var(--text-dark);
	display: flex;
	align-items: center;
	gap: 10px;
}

/* 趨勢圖容器 */
.mini-chart-container {
	width: 100%;
	height: 100px;
	margin-top: 15px;
}

/* 建議標籤 */
.buy-signal {
	padding: 4px 8px;
	border-radius: 6px;
	font-size: 12px;
	font-weight: bold;
}

.signal-buy {
	background: #d1fae5;
	color: #059669;
}

.signal-wait {
	background: #fef3c7;
	color: #d97706;
}

/* 回報清單 */
.report-section {
	margin-top: 40px;
	text-align: left;
}

.section-title {
	font-size: 18px;
	border-left: 4px solid var(--primary-red);
	padding-left: 12px;
	margin-bottom: 15px;
}

.report-item {
	background: #fff;
	border: 1px solid var(--border-color);
	border-radius: 12px;
	padding: 12px 16px;
	margin-bottom: 10px;
	display: flex;
	justify-content: space-between;
	align-items: center;
}

.user-avatar {
	width: 32px;
	height: 32px;
	background: #e2e8f0;
	border-radius: 50%;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 12px;
	color: var(--text-gray);
}

.report-price {
	font-weight: 700;
	color: var(--secondary-red);
	margin-left: 8px;
}

/* 彈窗樣式 */
.modal {
	display: none;
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: rgba(0, 0, 0, 0.5);
	z-index: 1000;
	align-items: center;
	justify-content: center;
	backdrop-filter: blur(4px);
}

.modal-content {
	background: white;
	padding: 24px;
	border-radius: 20px;
	width: 90%;
	max-width: 400px;
}

.form-group {
	margin-bottom: 16px;
}

.form-group label {
	display: block;
	margin-bottom: 6px;
	font-weight: 600;
}

.form-group input, .form-group select {
	width: 100%;
	padding: 12px;
	border-radius: 8px;
	border: 1px solid #ddd;
	box-sizing: border-box;
}

/* 按鈕 */
.button {
	display: inline-block;
	padding: 12px 24px;
	border-radius: 10px;
	text-decoration: none;
	font-weight: 600;
	cursor: pointer;
	border: none;
	transition: 0.3s;
	text-align: center;
}

.btn-primary {
	background: var(--primary-red);
	color: white;
}

.btn-dark {
	background: black;
	color: white;
}

.btn-gray {
	background: #94a3b8;
	color: white;
}

.button:hover {
	opacity: 0.9;
	transform: translateY(-1px);
}

.action-item {
	flex: 1;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	font-size: 16px;
	color: var(--text-gray);
	cursor: pointer;
	position: relative;
}

.action-item.active {
	color: var(--primary-red);
	font-weight: bold;
}

.reward-badge {
	position: absolute;
	top: -15px;
	right: 15%;
	background: var(--primary-red);
	color: white;
	font-size: 9px;
	padding: 2px 6px;
	border-radius: 10px;
	animation: bounce 2s infinite;
}

@keyframes bounce { 0%, 100% {
	transform: translateY(0); } 50% { transform:translateY(-5px); }
}

@media ( min-width : 769px) {
	.bottom-nav { display: none; }
}

@media ( max-width : 768px) {
	.desktop-buttons { display: none; }
	#productInfo {
		flex-direction: column; /* 變回上下排列 */
		align-items: center;
		text-align: center;
		padding: 10px;
		gap: 15px;
	}
	#productInfo img {
		width: 100%;         /* 寬度撐滿容器 */
        max-width: none;    /* 設定一個理想的最大寬度，避免在平板上太大 */
        height: auto;        /* 高度自動調整，維持比例 */
	}
	.product-name {
		font-size: 1.3rem;
	}
	.product-meta-tags {
		justify-content: center; /* 手機上標籤置中 */
	}
	.best-price-value {
		font-size: 28px;
	}
}
</style>
</head>

<body>

<div class="container">
	<div id="productInfo">
		<p style="color: #94a3b8;">商品資料載入中...</p>
	</div>

	<div class="report-section">
		<h3 class="section-title">最新會員回報價格</h3>
		<ul id="reportList" style="list-style: none; padding: 0;">
			<li style="color: #94a3b8; text-align: center; padding: 20px;">載入回報紀錄中...</li>
		</ul>
	</div>

	<div class="desktop-buttons" style="text-align: center; margin-top: 30px;">
		<button class="button btn-dark" onclick="goCompare()">查看比價</button>
		<button class="button btn-primary" onclick="openReportModal()">回報價格</button>
		<button class="button btn-dark" onclick="goHistory()">歷史價格</button>
	</div>
</div>

<div id="reportModal" class="modal">
	<div class="modal-content">
		<h3 style="margin-top: 0">回報商品價格</h3>
		<p id="modalProductName" style="color: #666; font-size: 14px; margin-bottom: 20px;"></p>
		<div class="form-group">
			<label>通路店家</label> 
			<select id="reportStore">
				<option value="">載入店家...</option>
			</select>
		</div>
		<div class="form-group">
			<label>目前售價 ($)</label> <input type="number" id="reportPrice" 	placeholder="請輸入看到的價格">
		</div>
		<button onclick="submitReport()" class="button btn-primary" style="width: 100%; margin-bottom: 10px;">送出回報</button>
		<button onclick="closeReportModal()" class="button btn-gray" style="width: 100%;">取消</button>
	</div>
</div>

<div class="bottom-nav">
	<div class="action-item" onclick="goCompare()">
		<span>🔍 查看比價</span>
	</div>
	<div class="action-item active" onclick="openReportModal()">
		<div class="reward-badge">+10pt</div>
		<span>📢 回報價格</span>
	</div>
	<div class="action-item" onclick="goHistory()">
		<span>📈 歷史價格</span>
	</div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");
let miniChartInstance = null;

if (productId) {
    initProductPage(productId);
}

async function initProductPage(id) {
    try {
        const [product, priceSummary] = await Promise.all([
            apiGetPublic(`/products/${id}`),
            apiGetPublic(`/products/${id}/price-lowest`)
        ]);

        renderProductBasic(product);
        const currentPrice = renderPriceSummary(priceSummary);
        renderReportList(id);
        loadStorePriceDistribution(id, currentPrice);
        checkInitialFavoriteStatus(id);
    } catch (err) {
        console.error("資料初始化失敗:", err);
    }
}

function renderProductBasic(p) {
    document.getElementById("productInfo").innerHTML = `
    	<div class="product-image-wrapper">
        <img src="${p.imageUrl || 'assets/placeholder.png'}" alt="${p.productName}">
        <button id="favoriteBtn" class="fav-btn" onclick="handleFavoriteClick(this, '${p.productId}')">
        	<svg viewBox="0 0 24 24">
        		<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    		</svg>
        </button>
    </div>
    <div class="product-detail-content">
        <div class="product-header">
            <h2 class="product-name">${p.brand} ${p.productName}</h2>
        </div>
        <div class="product-meta-tags">
            <span class="meta-tag">規格：${p.spec}</span>
            <span class="meta-tag">條碼：${p.barcode}</span>
        </div>
        <div id="price-container"></div> 
    </div>
    `;
}

function renderPriceSummary(data) {
    const container = document.getElementById("price-container");
    const history = data.historical;
    const recent = data.recent30Days;

    if (!history && !recent) {
        container.innerHTML = `<p style="color:#94a3b8">目前暫無價格紀錄</p>`;
        return;
    }

    // 決定要顯示的價格主體
    const displayData = recent || history;
    
    // 修改標籤文字：配合柱狀圖，強調這是「目前」篩選出的最優價格
    const labelText = recent ? "✨ 目前市場最低價" : "🏆 歷史最優價格";
    const labelClass = recent ? "label-recent" : "label-history";
    
    // 建議入手邏輯：
    // 這裡可以保留歷史對比，因為「歷史低點」依然是很有價值的參考指標
    const isGoodPrice = history ? (displayData.price <= history.price * 1.05) : true;
    
    // 如果是市場最低且接近歷史低點
    const signalHTML = isGoodPrice 
        ? `<span class="buy-signal signal-buy">🔥 划算入手</span>` 
        : `<span class="buy-signal signal-wait">⏳ 價格稍高</span>`;

    container.innerHTML = `
        <div class="best-price-card">
            <span class="best-price-label ${labelClass}">${labelText}</span>
            <div class="best-price-value">
                $${displayData.price}
                ${signalHTML}
            </div>

            <div class="mini-chart-container">
                <canvas id="miniTrendChart"></canvas>
            </div>
        </div>
    `;

    return displayData.price; // 回傳這個價格
}

async function loadStorePriceDistribution(id, highlightPrice) {
    // 抓取該商品所有的價格紀錄
    let rawPrices = await apiGetPublic(`/prices/product/${id}`);

    if (!rawPrices || rawPrices.length === 0) {
        // 如果沒資料，給一組預設值模擬
        renderMiniChart([159, 155, 160]);
        return;
    }

    // --- 重要：過濾邏輯 (確保每個通路只有一個最新價格) ---
    const latestStorePricesMap = new Map();

    rawPrices.forEach(item => {
        const storeId = item.store.storeId;
        // 如果 Map 裡還沒有這個店，或者這筆資料比 Map 裡的更新 (比較 ID 或日期)
        if (!latestStorePricesMap.has(storeId) || item.id > latestStorePricesMap.get(storeId).id) {
            latestStorePricesMap.set(storeId, item);
        }
    });

    // 轉換回純價格陣列供圖表使用
    const filteredPrices = Array.from(latestStorePricesMap.values()).map(item => item.price);

    renderMiniChart(filteredPrices, highlightPrice);
}

async function loadHistoryAndChart(id) {
    let historyData = getCachedHistory(id);
    if (!historyData) {
        historyData = await apiGetPublic(`/history/product/${id}`);
        setCachedHistory(id, historyData);
    }

    const chartPrices = historyData && historyData.length >= 2 
        ? historyData.map(item => item.newPrice).reverse()
        : [159, 155, 160, 145, 145, 142, 139]; // 預設模擬數據

    renderMiniChart(chartPrices);
}

function renderMiniChart(dataToUse, highlightPrice) {
    const ctx = document.getElementById('miniTrendChart')?.getContext('2d');
    if (!ctx) return;

    if (miniChartInstance) miniChartInstance.destroy();

    const priceCounts = {};
    dataToUse.forEach(p => {
        priceCounts[p] = (priceCounts[p] || 0) + 1;
    });

    const labels = Object.keys(priceCounts).sort((a, b) => a - b);
    const counts = labels.map(label => priceCounts[label]);

    miniChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels.map(l => `$${l}`),
            datasets: [{
                data: counts,
                backgroundColor: labels.map(l => Number(l) === Number(highlightPrice) ? '#FF4500' : '#E2E8F0'),
                borderRadius: 4,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                // 增加提示框，顯示該價格有多少通路
                tooltip: {
                    callbacks: {
                        title: (items) => `價格: ${items[0].label}`,
                        label: (item) => `通路數量: ${item.raw}`
                    }
                }
            },
            scales: {
                x: { 
                    grid: { display: false },
                    ticks: { font: { size: 10 } }
                },
                y: { display: false, beginAtZero: true }
            }
        }
    });
}

async function renderReportList(id) {
    const listContainer = document.getElementById("reportList");
    try {
        const reports = await apiGetPublic(`/price-reports/product/${id}?limit=5`);
        if (!reports?.length) {
            listContainer.innerHTML = `<li style="text-align:center;color:#94a3b8">尚無回報紀錄</li>`;
            return;
        }

        listContainer.innerHTML = reports.map(r => `
            <li class="report-item">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="user-avatar">${(r.userName || "U")[0]}</div>
                    <div>
                        <span style="font-size:11px; background:#f1f5f9; padding:2px 6px; border-radius:4px;">${r.storeName}</span>
                        <strong>${r.userName}</strong> <span class="report-price">$${r.price}</span>
                    </div>
                </div>
                <div style="font-size:12px; color:#94a3b8">${formatTimeAgo(r.date)}</div>
            </li>
        `).join("");
    } catch (err) {
        listContainer.innerHTML = `<li>載入失敗</li>`;
    }
}

// 通用邏輯函數
function formatTimeAgo(time) {
    const diff = (Date.now() - new Date(time)) / 1000;
    if (diff < 60) return "剛剛";
    if (diff < 3600) return `${Math.floor(diff / 60)} 分前`;
    if (diff < 86400) return `${Math.floor(diff / 3600)} 小時前`;
    return `${Math.floor(diff / 86400)} 天前`;
}

function openReportModal() {
    if (!getCurrentUser()) {
        showToast("想領取積分嗎？請先登入喔", "立即登入", () => {
            location.href = "login.html";
        });
        return;
    }
    document.getElementById("modalProductName").textContent = document.querySelector(".product-name")?.textContent;
    document.getElementById("reportModal").style.display = "flex";
    loadStoreOptions();
}

function closeReportModal() { document.getElementById("reportModal").style.display = "none"; }

async function loadStoreOptions() {
    const select = document.getElementById("reportStore");
    try {
        const stores = await apiGetPublic("/stores");
        select.innerHTML = `<option value="">請選擇店家</option>` + 
            stores.map(s => `<option value="${s.storeId}">${s.storeName}</option>`).join("");
    } catch (err) {
        select.innerHTML = `<option>載入失敗</option>`;
    }
}

async function submitReport() {
    const storeId = document.getElementById("reportStore").value;
    const price = document.getElementById("reportPrice").value;
    
    if (!storeId || !price) {
        showToast("⚠️ 請完整填寫內容");
        return;
    }

    try {
        await apiPost("/price-reports", {
            productId, storeId, reportedPrice: parseFloat(price), userId: getCurrentUser().id
        });
        
        closeReportModal(); // 關閉彈窗
        showToast("✅ 回報成功！審核通過將發送積分"); // 用 Toast 代替 Alert
        
        localStorage.removeItem(`priceHistory_${productId}`);
        renderReportList(productId);
    } catch (err) { 
        showToast("❌ " + err.message); 
    }
}

// 頁面跳轉
function goCompare() { location.href = `compare.html?id=${productId}`; }
function goHistory() { location.href = `history.html?productId=${productId}`; }

// 快取管理
function getCachedHistory(id) {
    const raw = localStorage.getItem(`priceHistory_${id}`);
    if (!raw) return null;
    const cached = JSON.parse(raw);
    return (Date.now() - cached.timestamp < 600000) ? cached.data : null;
}
function setCachedHistory(id, data) {
    localStorage.setItem(`priceHistory_${id}`, JSON.stringify({ timestamp: Date.now(), data }));
}

async function checkInitialFavoriteStatus(productId) {
    const user = getCurrentUser();
    if (!user) return; // 未登入就不檢查

    try {
        const userId = user.userId || user.id;
        // 假設後端有一個檢查狀態的 API，或從收藏清單比對
        const status = await apiGet(`/favorites/status?userId=${userId}&productId=${productId}`);
        if (status.isFavorited) {
            document.getElementById("favoriteBtn").classList.add("active");
        }
    } catch (err) {
        console.warn("無法取得收藏狀態", err);
    }
}

</script>
</body>
</html>
