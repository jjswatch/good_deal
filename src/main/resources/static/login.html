<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>會員登入｜CoSave　一塊省</title>
<link rel="stylesheet" href="css/style.css" />
<style>
/* Hero */
.hero {
	background: #f7f7f7;
	padding: 24px 20px;
	text-align: center;
}

.hero h2 {
	margin: 0;
	font-size: 24px;
}

/* Main */
.main {
	max-width: 420px;
	margin: 60px auto;
	padding: 0 20px;
}

.main h2 {
	text-align: center;
	margin-bottom: 24px;
}

/* Form */
.form-group {
	margin-bottom: 16px;
}

.form-group label {
	display: block;
	margin-bottom: 6px;
	font-size: 14px;
	color: #555;
}

.form-group input {
	width: 100%;
	padding: 12px;
	border-radius: 10px;
	border: 1px solid #ddd;
	font-size: 15px;
	box-sizing: border-box;
}

.form-group input:focus {
	outline: none;
	border-color: #999;
}

/* Button */
button {
	width: 100%;
	padding: 14px;
	border-radius: 12px;
	border: none;
	background: #111;
	color: #fff;
	font-size: 16px;
	cursor: pointer;
}

button:hover {
	background: #333;
}

/* Extra */
.extra {
	text-align: center;
	margin-top: 16px;
	font-size: 14px;
	color: #777;
}

.extra a {
	color: #111;
	text-decoration: none;
	font-weight: bold;
}

.extra a:hover {
	text-decoration: underline;
}
</style>
</head>
<body>
<nav>
	<div class="nav-container">
		<div class="logo" onclick="location.href='index.html'">一塊省</div>
	</div>
</nav>

<section class="hero">
	<h2>會員登入</h2>
</section>

<main class="main">
	<div class="form-group">
		<label for="username">帳號</label> <input type="text" id="username" placeholder="請輸入帳號">
	</div>

	<div class="form-group">
		<label for="password">密碼</label> <input type="password" id="password" placeholder="請輸入密碼">
	</div>

	<button onclick="login()">登入</button>

	<div class="extra">還沒有帳號？ <a href="register.html">立即註冊</a></div>
</main>

<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
//Toast 工具函數
function showToast(message) {
    let toast = document.getElementById("toastNotification");
    if (!toast) {
        toast = document.createElement("div");
        toast.id = "toastNotification";
        toast.className = "toast";
        document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.classList.add("show");

    if (window.toastTimer) clearTimeout(window.toastTimer);
    window.toastTimer = setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}

// 修改後的登入函數
async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    // 1. 檢查欄位是否空白
    if (!username || !password) {
        showToast("⚠️ 請輸入帳號與密碼");
        return;
    }

    try {
        const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
            const errData = await res.json();
            // 2. 顯示後端回傳的錯誤 (例如：密碼錯誤)
            showToast("❌ " + (errData.error || "登入失敗"));
            return;
        }

        const data = await res.json();

        // 儲存資訊
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.user.role);
        localStorage.setItem("username", data.user.username);

        // 3. 登入成功提示 (可選，通常直接跳轉)
        showToast("✅ 登入成功，正在跳轉...");

        setTimeout(() => {
            if (data.user.role === "ADMIN") {
                location.href = "admin/admin-dashboard.html";
            } else {
                location.href = "index.html";
            }
        }, 800);

    } catch (err) {
        // 4. 系統錯誤提示
        showToast("📡 網路連線異常，請稍後再試");
    }
}
</script>
</body>
</html>
