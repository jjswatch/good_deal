<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>設定賣場｜CoSave　一塊省</title>
<link rel="stylesheet" href="css/style.css" />
<style>
.container { max-width: 500px; margin: 0 auto; padding: 20px 16px; }
.header { margin-bottom: 24px; }
.header h1 { font-size: 20px; margin-bottom: 8px; }
.header p { color: #64748b; font-size: 14px; }

.nav-close {
	width: 40px;
	height: 40px;
	display: flex;
	align-items: center;
	justify-content: center;
	cursor: pointer;
	border-radius: 50%;
	transition: background 0.2s;
}

.nav-close:hover { background: #f1f5f9; }
        
.nav-title {
	font-size: 18px;
	font-weight: 700;
}
        
/* 賣場卡片網格 */
.store-grid {
	display: grid;
	grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 30px;
}

.store-item {
	background: white;
	border: 2px solid #f1f5f9;
	border-radius: 16px;
	padding: 16px;
	text-align: center;
	cursor: pointer;
	transition: all 0.2s;
	position: relative;
}

.store-item:hover { border-color: #ddd6fe; }

/* 選中狀態 */
.store-item.active {
	border-color: #7c3aed;
    background: #f5f3ff;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(124, 58, 237, 0.1);
}

.store-item .badge {
	position: absolute;
    top: 8px;
    right: 8px;
    background: #7c3aed;
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    display: none;
    align-items: center;
    justify-content: center;
}

.store-item.active .badge { display: flex; }

.store-name { font-weight: 700; display: block; margin-top: 8px; }
        
.footer-action {
	bottom: 0;
    left: 0;
    right: 0;
    background: white;
    padding: 16px;
	justify-content: center;
}
        
.btn-save-stores {
	max-width: 468px;
    width: 100%;
    background: #7c3aed;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
}
.btn-save-stores:disabled { background: #cbd5e1; cursor: not-allowed; }
</style>
</head>
<body>
<nav>
	<div class="nav-container">
		<div style="margin-left: auto; display: flex; align-items: center;">
			<div class="nav-close" onclick="location.href='profile.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
	    </div>
	</div>
</nav>
<div class="container">
    <div class="header">
        <h1>📍 我的常去賣場</h1>
        <p>請選擇 1~3 間您最常消費的賣場，我們將為您優先計算這些店家的優惠組合。</p>
    </div>

    <div id="storeGrid" class="store-grid">
        <div style="text-align:center; color:#94a3b8; grid-column: 1/-1; padding:40px;">載入中...</div>
    </div>
</div>

<div class="footer-action">
    <button id="saveBtn" class="btn-save-stores" onclick="savePreferredStores()" disabled>儲存設定 (0/3)</button>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
let allStores = [];
let selectedStoreIds = [];

document.addEventListener("DOMContentLoaded", async () => {
	const user = await apiGet("/users/profile");
    if (!user) { location.href = "login.html"; return; }

    try {
        allStores = await apiGet("/stores");

        const currentPrefs = await apiGet(`/user/preferred-stores/${user.userId}`);
        selectedStoreIds = currentPrefs.map(p => p.store.storeId);
            
        renderStores();
        updateButton();
    } catch (e) {
        console.error(e);
        alert("載入失敗，請稍後再試");
    }
});

function renderStores() {
	const grid = document.getElementById("storeGrid");
    grid.innerHTML = allStores.map(store => {
        const isActive = selectedStoreIds.includes(store.storeId);
        const order = selectedStoreIds.indexOf(store.storeId) + 1;
        return `
        	<div class="store-item ${isActive ? 'active' : ''}" onclick="toggleStore(${store.storeId})">
            	<div class="badge">${order}</div>
                <div style="font-size: 24px;">${getStoreEmoji(store.storeName)}</div>
                <span class="store-name">${store.storeName}</span>
            </div>
        `;
    }).join("");
}

function toggleStore(id) {
    const index = selectedStoreIds.indexOf(id);
    if (index > -1) {
        selectedStoreIds.splice(index, 1);
    } else {
        if (selectedStoreIds.length >= 3) {
            alert("最多只能選擇 3 間賣場喔！");
            return;
        }
        selectedStoreIds.push(id);
    }
    renderStores();
    updateButton();
}

function updateButton() {
    const btn = document.getElementById("saveBtn");
    btn.disabled = selectedStoreIds.length === 0;
    btn.innerText = `儲存設定 (${selectedStoreIds.length}/3)`;
}

async function savePreferredStores() {
    const user = getCurrentUser();
    const userId = user.userId || user.id;
    if (!userId) {
        alert("找不到使用者資訊，請重新登入");
        location.href = "login.html";
        return;
    }
    const payload = {
        userId: userId,
        storeIds: selectedStoreIds
    };

    try {
        await apiPost("/user/preferred-stores/sync", payload);
        alert("賣場偏好已更新！");
        location.href = "profile.html";
    } catch (err) {
    	console.error("同步失敗:", err);
        alert("儲存失敗：" + err.message);
    }
}

function getStoreEmoji(name) {
    if (name.includes("全聯")) return "🧧";
    if (name.includes("家樂福")) return "🔵";
    if (name.includes("愛買")) return "📦";
    if (name.includes("佳瑪")) return "🔴";
    return "🏪";
}
</script>
</body>
</html>
