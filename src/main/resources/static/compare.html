<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>商店比價｜CoSave　一塊省</title>
<link rel="stylesheet" href="css/style.css" />
<style>
:root {
	--primary-red: #FF4500;
	--secondary-red: #ef4444;
	--text-dark: #1e293b;
	--text-gray: #64748b;
	--bg-light: #f8fafc;
	--border-color: #e2e8f0;
}
/* 已加入清單的按鈕樣式 */
.btn-added {
    background: #e8f5e9 !important; /* 淺綠色背景 */
    color: #2e7d32;
    transform: scale(1.1);
}

.btn-added:hover {
    background: #c8e6c9 !important;
}

/* 商品區塊 */
.product-header {
    max-width: 1100px;
    margin: 20px auto;
    padding: 20px;
    background: #fafafa;
    border-radius: 14px;
    display: flex;
    gap: 20px;
    align-items: center;
}

.product-header img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 14px;
}

.product-info h2 {
    margin: 0;
}

.product-info p {
    margin: 4px 0;
    color: #666;
}

/* 比價清單 */
#priceList {
    max-width: 1100px;
    margin: 20px auto;
}

.price-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    background: #fff;
    border-radius: 14px;
    border: 1px solid #eee;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 12px;
}

.price-store {
    font-size: 18px;
    font-weight: bold;
}

.price-value {
    font-size: 22px;
    font-weight: bold;
    color: #d62828;
}

.price-card a {
    padding: 8px 14px;
    background: black;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

.price-card a:hover {
    background: #333;
}

/* 商店 Logo 樣式 */
.store-info-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
}

.store-logo {
    width: 32px;
    height: 32px;
    object-fit: contain; /* 保持 Logo 比例不變形 */
    background: #f8fafc;
    padding: 2px;
    border-radius: 6px;
    border: 1px solid #f1f5f9;
}

.price-store {
    display: flex;
    flex-direction: column;
    justify-content: center;
}
</style>
</head>

<body>



<!-- 商品基本資訊 -->
<div id="productBlock" class="product-header" style="display:none;">
    <img id="productImg" src="">
    <div class="product-info">
        <h2 id="productName"></h2>
        <p id="productBrand"></p>
        <p id="productSpec"></p>
    </div>
</div>

<!-- 價格列表 -->
<div id="priceList"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script>
window.addEventListener("pageshow", () => {
    loadPrices();
});

const user = getCurrentUser();

function getQueryParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

let currentProduct = null;

async function loadProduct() {
    const id = getQueryParam("id");
    if (!id) return;

    const product = await apiGet(`/products/${id}`);

    if (!product) return;

    currentProduct = product;

    document.getElementById("productBlock").style.display = "flex";
    document.getElementById("productImg").src = product.imageUrl || "assets/placeholder.png";
    document.getElementById("productName").innerText = product.productName;
    document.getElementById("productBrand").innerText = product.brand ? "品牌：" + product.brand : "";
    document.getElementById("productSpec").innerText = product.spec ? "規格：" + product.spec : "";
}

function getWishlistIds() {
    const user = getCurrentUser();
    if (!user) return [];
    const uid = user.userId || user.id;
    const wishlist = JSON.parse(localStorage.getItem(`wishlist_${uid}`)) || [];
    return wishlist.map(item => item.priceId);
}

async function loadPrices() {
    const id = getQueryParam("id");
    if (!id) return;

    const prices = await apiGet(`/prices/product/${id}`);
    const list = document.getElementById("priceList");

    if (!prices || prices.length === 0) {
        list.innerHTML = "<p style='text-align:center;color:#666;'>尚無比價資料</p>";
        return;
    }

    const logoMap = { 1: 'px.png', 2: 'carrefour.png', 3: 'market.png', 4: 'mega.png' };
    const savedIds = getWishlistIds();

    prices.sort((a, b) => a.price - b.price);

    list.innerHTML = prices.map(p => {
    	const displayDate = p.updatedAt ? new Date(p.updatedAt).toLocaleDateString('zh-TW') : '今日';
        const logoPath = `assets/stores/${logoMap[p.store.storeGroup] || 'placeholder.png'}`;
        
        // 判斷是否已在清單中
        const isAdded = savedIds.includes(p.priceId);

        return `
        <div class="price-card">
            <div class="store-info-wrapper">
                <img src="${logoPath}" alt="${p.store.storeName}" class="store-logo" onerror="this.src='assets/placeholder.png'">
                <div class="price-store">
                    <span class="store-name">${p.store.storeName}</span>
                    <div style="font-size:11px; color:#94a3b8; font-weight:normal; margin-top:2px;">
                        回報日期：${displayDate}
                    </div>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:15px;">
                <div class="price-value">$${p.price}</div>
                ${isAdded ? 
                    `<button onclick="location.href='wishlist.html'" class="btn-added" style="background:#e8f5e9; border:none; cursor:pointer; padding:8px; border-radius:50%;">✅</button>` :
                    `<button id="btn-${p.priceId}" onclick="addToWishlist(this, '${id}', '${p.priceId}', '${p.store.storeName}', ${p.price})" 
                            style="background:#f1f5f9; border:none; cursor:pointer; padding:8px; border-radius:50%; transition:0.2s;">🛒</button>`
                }
            </div>
        </div>
    `}).join("");
}

function addToWishlist(btn, productId, priceId, storeName, price) {
    const user = getCurrentUser();
    if (!user) {
        showToast("💡 請先登入後再加入清單喔！");
        return;
    }
    const uid = user.userId || user.id;

    // 取得目前的商品基本資訊
    const productName = document.getElementById("productName").innerText;
    const productImg = document.getElementById("productImg").src;

    // 取得現有的清單 (如果沒有就建立空陣列)
    let wishlist = JSON.parse(localStorage.getItem(`wishlist_${uid}`)) || [];

    // 檢查是否重複加入
    if (wishlist.some(item => item.priceId === priceId)) {
        showToast("⚠️ 這項價格已經在清單中囉！");
        return;
    }

    // 加入新項目
    const newItem = {
    	productId: parseInt(productId),
        priceId,
        brand: currentProduct ? currentProduct.brand : "",
        productName: currentProduct ? currentProduct.productName : "未知名商品",
        productImg: currentProduct ? currentProduct.imageUrl : "",
        storeName,
        price,
        addedAt: new Date().toLocaleDateString()
    };

    wishlist.push(newItem);
    localStorage.setItem(`wishlist_${uid}`, JSON.stringify(wishlist));

	// 2. UI 狀態即時切換
    btn.innerHTML = "✅";
    btn.classList.add("btn-added");
    btn.onclick = () => location.href = 'wishlist.html'; // 更改點擊行為
    
    // 3. 顯示自定義 Toast (帶有動作按鈕)
    showToast(`✅ 已加入清單！`, "查看清單", () => {
        location.href = "wishlist.html";
    });
}

// 初始化
loadProduct();
loadPrices();
</script>

</body>
</html>
