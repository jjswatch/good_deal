<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>商店比價｜CoSave　一塊省</title>
<link rel="stylesheet" href="css/style.css" />
<style>
:root {
	--primary-red: #FF4500;
	--secondary-red: #ef4444;
	--text-dark: #1e293b;
	--text-gray: #64748b;
	--bg-light: #f8fafc;
	--border-color: #e2e8f0;
}
/* 已加入清單的按鈕樣式 */
.btn-added {
    background: #e8f5e9 !important; /* 淺綠色背景 */
    color: #2e7d32;
    transform: scale(1.1);
}

.btn-added:hover {
    background: #c8e6c9 !important;
}

/* 商品區塊 */
.product-header {
    max-width: 1100px;
    margin: 20px auto;
    padding: 20px;
    background: #fafafa;
    border-radius: 14px;
    display: flex;
    gap: 20px;
    align-items: center;
}

.product-header img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 14px;
}

.product-info h2 {
    margin: 0;
}

.product-info p {
    margin: 4px 0;
    color: #666;
}

/* 比價清單 */
#priceList {
    max-width: 1100px;
    margin: 20px auto;
}

.price-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    background: #fff;
    border-radius: 14px;
    border: 1px solid #eee;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 12px;
}

.price-store {
    font-size: 18px;
    font-weight: bold;
}

.price-value {
    font-size: 22px;
    font-weight: bold;
    color: #d62828;
}

.price-card a {
    padding: 8px 14px;
    background: black;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

.price-card a:hover {
    background: #333;
}

/* 商店 Logo 樣式 */
.store-info-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
}

.store-logo {
    width: 32px;
    height: 32px;
    object-fit: contain; /* 保持 Logo 比例不變形 */
    background: #f8fafc;
    padding: 2px;
    border-radius: 6px;
    border: 1px solid #f1f5f9;
}

.sort-container {
    max-width: 1100px;
    margin: 10px auto;
    display: flex;
    justify-content: flex-end; /* 靠右對齊 */
    align-items: center;
    gap: 8px;
    padding: 0 10px;
    font-size: 14px;
    color: var(--text-gray);
}

.sort-select {
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    background: white;
    outline: none;
    cursor: pointer;
}

.price-store {
    display: flex;
    flex-direction: column;
    justify-content: center;
}
</style>
</head>

<body>



<!-- 商品基本資訊 -->
<div id="productBlock" class="product-header" style="display:none;">
    <img id="productImg" src="">
    <div class="product-info">
        <h2 id="productName"></h2>
        <p id="productBrand"></p>
        <p id="productSpec"></p>
    </div>
</div>

<div class="sort-container">
    <span>排序依據：</span>
    <select id="sortSelect" class="sort-select" onchange="renderPrices()">
    	<option value="dateDesc">日期：新 → 舊</option>
        <option value="priceAsc">價格：低 → 高</option>
    </select>
</div>

<div id="priceList"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script>
window.addEventListener("pageshow", () => {
    loadPrices();
});

const user = getCurrentUser();

function getQueryParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

let currentProduct = null;

async function loadProduct() {
    const id = getQueryParam("id");
    if (!id) return;

    const product = await apiGet(`/products/${id}`);

    if (!product) return;

    currentProduct = product;

    document.getElementById("productBlock").style.display = "flex";
    document.getElementById("productImg").src = product.imageUrl || "assets/placeholder.png";
    document.getElementById("productName").innerText = product.productName;
    document.getElementById("productBrand").innerText = product.brand ? "品牌：" + product.brand : "";
    document.getElementById("productSpec").innerText = product.spec ? "規格：" + product.spec : "";
}

function getWishlistIds() {
    const user = getCurrentUser();
    if (!user) return [];
    const uid = user.userId || user.id;
    const wishlist = JSON.parse(localStorage.getItem(`wishlist_${uid}`)) || [];
    return wishlist.map(item => String(item.priceId));
}

let allPrices = []; // 建立全域變數存放抓回來的價格

async function loadPrices() {
    const id = getQueryParam("id");
    if (!id) return;

    // 1. 從 API 抓取原始資料
    const prices = await apiGet(`/prices/product/${id}`);
    
    if (!prices || prices.length === 0) {
        document.getElementById("priceList").innerHTML = "<p style='text-align:center;color:#666;margin-top:20px;'>尚無比價資料</p>";
        return;
    }

    allPrices = prices; // 存入全域變數
    renderPrices();      // 執行繪製
}

function renderPrices() {
    const list = document.getElementById("priceList");
    const sortType = document.getElementById("sortSelect").value;
    const productId = getQueryParam("id");
    
    // 2. 複製一份陣列來進行排序 (避免污染原資料)
    let sortedPrices = [...allPrices];

    if (sortType === "dateDesc") {
        // 日期由新到舊 (越新的日期，毫秒數越大，所以用 b - a)
        sortedPrices.sort((a, b) => {
            const dateA = new Date(a.updatedAt || a.priceDate || 0);
            const dateB = new Date(b.updatedAt || b.priceDate || 0);
            return dateB - dateA;
        });
    } else if (sortType === "priceAsc") {
        // 價格由低到高
        sortedPrices.sort((a, b) => a.price - b.price);
    }

    // 3. 準備繪製 UI
    const logoMap = { 1: 'px.png', 2: 'carrefour.png', 3: 'market.png', 4: 'mega.png' };
    const savedIds = getWishlistIds();

    list.innerHTML = sortedPrices.map(p => {
        const displayDate = p.updatedAt ? new Date(p.updatedAt).toLocaleDateString('zh-TW') : '今日';
        const logoPath = `assets/stores/${logoMap[p.store.storeGroup] || 'placeholder.png'}`;
        const isAdded = savedIds.includes(String(p.priceId));

        return `
        <div class="price-card">
            <div class="store-info-wrapper">
                <img src="${logoPath}" class="store-logo" onerror="this.src='assets/placeholder.png'">
                <div class="price-store">
                    <span class="store-name">${p.store.storeName}</span>
                    <div style="font-size:11px; color:#94a3b8; font-weight:normal; margin-top:2px;">
                        回報日期：${displayDate}
                    </div>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:15px;">
                <div class="price-value">$${p.price}</div>
                <button id="btn-${p.priceId}" 
                    onclick="toggleWishlist(this, '${productId}', '${p.priceId}', '${p.store.storeName}', ${p.price})" 
                    class="${isAdded ? 'btn-added' : ''}"
                    style="background:${isAdded ? '#e8f5e9' : '#f1f5f9'}; border:none; cursor:pointer; padding:8px; border-radius:50%; transition:0.2s;">
                    ${isAdded ? '✅' : '🛒'}
                </button>
            </div>
        </div>
    `;}).join("");
}

function toggleWishlist(btn, productId, priceId, storeName, price) {
    const user = getCurrentUser();
    if (!user) {
        showToast("💡 請先登入後再管理清單喔！");
        return;
    }
    const uid = user.userId || user.id;
    const storageKey = `wishlist_${uid}`;
    let wishlist = JSON.parse(localStorage.getItem(storageKey)) || [];

    // 1. 尋找清單中是否已有「同一個商品編號」
    const existingIndex = wishlist.findIndex(item => String(item.productId) === String(productId));

    if (existingIndex > -1) {
        // --- 情況 A：商品已在清單中 ---
        const existingItem = wishlist[existingIndex];

        if (String(existingItem.priceId) === String(priceId)) {
            // 如果連 priceId 都一樣 -> 使用者想「取消選購」這家店
            wishlist.splice(existingIndex, 1);
            showToast("🗑️ 已從清單中移除");
        } else {
            // 如果 productId 一樣但 priceId 不同 -> 使用者想「換一家店」買
            wishlist[existingIndex] = {
                ...existingItem, // 保留原本的圖片、名稱等資訊
                priceId: String(priceId),
                storeName: storeName,
                price: price,
                addedAt: new Date().toLocaleDateString() // 更新加入日期
            };
            showToast(`🔄 已更換為「${storeName}」的價格`);
        }
    } else {
        // --- 情況 B：商品完全沒在清單中 ---
        const newItem = {
            productId: parseInt(productId),
            priceId: String(priceId),
            brand: currentProduct ? currentProduct.brand : "",
            productName: currentProduct ? currentProduct.productName : "未知名商品",
            productImg: currentProduct ? currentProduct.imageUrl : "",
            storeName,
            price,
            addedAt: new Date().toLocaleDateString()
        };
        wishlist.push(newItem);
        showToast(`✅ 已加入清單！`, "查看清單", () => {
            location.href = "wishlist.html";
        });
    }

    // 2. 儲存回 localStorage
    localStorage.setItem(storageKey, JSON.stringify(wishlist));

    // 3. 重要：重新渲染畫面，這樣「別家店」的打勾才會消失
    renderPrices();
}

async function init() {
    await loadProduct(); // 先載入商品基本資訊
    await loadPrices();  // 再載入價格
}
init();
</script>

</body>
</html>
