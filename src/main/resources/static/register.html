<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>會員註冊｜CoSave　一塊省</title>
<link rel="stylesheet" href="css/style.css" />
<style>
/* Hero */
.hero {
	background: #f7f7f7;
	padding: 24px 20px;
	text-align: center;
}

.hero h2 {
	margin: 0;
	font-size: 24px;
}

/* Main */
.main {
	max-width: 420px;
	margin: 60px auto;
	padding: 0 20px;
}

.main h2 {
	text-align: center;
	margin-bottom: 24px;
}

/* Form */
.form-group {
	margin-bottom: 16px;
}

.form-group label {
	display: block;
	margin-bottom: 6px;
	font-size: 14px;
	color: #555;
}

.form-group input {
	width: 100%;
	padding: 12px;
	border-radius: 10px;
	border: 1px solid #ddd;
	font-size: 15px;
	box-sizing: border-box;
}

.form-group input:focus {
	outline: none;
	border-color: #999;
}

/* Button */
button {
	width: 100%;
	padding: 14px;
	border-radius: 12px;
	border: none;
	background: #111;
	color: #fff;
	font-size: 16px;
	cursor: pointer;
}

button:hover {
	background: #333;
}

/* Extra */
.extra {
	text-align: center;
	margin-top: 16px;
	font-size: 14px;
	color: #777;
}

.extra a {
	color: #111;
	text-decoration: none;
	font-weight: bold;
}

.extra a:hover {
	text-decoration: underline;
}
</style>
</head>

<body>

<nav>
	<div class="nav-container">
		<div class="logo" onclick="location.href='index.html'">一塊省</div>
	</div>
</nav>

<section class="hero">
	<h2>會員註冊</h2>
</section>

<main class="main">
	<div class="form-group">
		<label>使用者名稱</label>
		<input id="username" placeholder="請輸入名稱">
	</div>

	<div class="form-group">
		<label>Email</label>
		<input id="email" type="email" placeholder="example@email.com">
	</div>
	
	<div class="form-group">
		<label>密碼</label>
		<input id="password" type="password" placeholder="至少 6 碼">
	</div>
	
	<div class="form-group">
    	<label>確認密碼</label>
    	<input id="confirmPassword" type="password" placeholder="請再次輸入密碼">
	</div>
	
	<button onclick="register()">註冊</button>

	<div class="extra">
		已有帳號？<a href="login.html">前往登入</a>
	</div>
</main>

<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
async function register() {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value; // 取得密碼
    const confirmPassword = document.getElementById("confirmPassword").value; // 取得確認密碼

    // 1. 檢查所有欄位（包含新的確認密碼）
    if (!username || !email || !password || !confirmPassword) { 
        showToast("⚠️ 請填寫所有欄位"); 
        return; 
    }

    // 2. Email 格式檢查
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showToast("📧 Email 格式不太對喔，請檢查一下");
        return;
    }

    // 3. 密碼長度檢查
    if (password.length < 6) {
        showToast("🔑 密碼至少需要 6 碼");
        return;
    }

    // ✨ 關鍵新增：檢查兩次密碼是否相同
    if (password !== confirmPassword) {
        showToast("❌ 兩次輸入的密碼不一致喔！");
        return;
    }

    try {
        // 注意：這裡 body 送出的欄位名稱需對應你的後端，維持你原有的 passwordHash
        const res = await fetch("/api/auth/register", { 
            method: "POST", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify({ 
                username, 
                email, 
                passwordHash: password // 將確認過後的密碼送出
            }) 
        });

        if (!res.ok) {
            const errData = await res.json(); 
            showToast("❌ " + (errData.error || "註冊失敗")); 
            return; 
        }

        const data = await res.json(); 
        showToast("✅ " + (data.message || "註冊成功！即將前往登入")); 
        
        setTimeout(() => {
            location.href = "login.html";
        }, 1500);

    } catch (e) {
        showToast("📡 系統錯誤，請稍後再試"); 
    }
}
</script>

</body>
</html>
